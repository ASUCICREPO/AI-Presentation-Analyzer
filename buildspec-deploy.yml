version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - node --version
      - npm --version
      - yum install -y zip
    finally:
      - echo "Install phase completed"

  pre_build:
    commands:
      - echo "Starting CDK deployment process..."
      - echo "Branch - $BRANCH_NAME"
      - echo "Stack Name - $STACK_NAME"
      - |
        if [ -z "$BRANCH_NAME" ] || [ -z "$STACK_NAME" ]; then
          echo "Required environment variables not set"
          exit 1
        fi
      - |
        CDK_CONTEXT="-c branchName=$BRANCH_NAME"
        if [ -n "$GITHUB_TOKEN" ] && [ -n "$GITHUB_OWNER" ] && [ -n "$GITHUB_REPO" ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c githubOwner=$GITHUB_OWNER -c githubRepo=$GITHUB_REPO -c githubToken=$GITHUB_TOKEN"
          echo "GitHub mode enabled for $GITHUB_OWNER/$GITHUB_REPO"
        else
          echo "Bare mode (no GitHub CI/CD) -- frontend will be built and deployed by this build"
        fi
        export CDK_CONTEXT
      - echo "Changing to backend directory..."
      - cd backend
      - echo "Installing npm dependencies..."
      - npm install
      - echo "Checking if CDK bootstrap is needed..."
      - npx cdk bootstrap $CDK_CONTEXT --require-approval never
    finally:
      - echo "Pre-build phase completed"

  build:
    on-failure: ABORT
    commands:
      - echo "Deploying CDK stack..."
      - echo "Listing available stacks..."
      - npx cdk list $CDK_CONTEXT
      - echo "Deploying all stacks..."
      - npx cdk deploy --all $CDK_CONTEXT --require-approval never --verbose
      - echo "CDK deployment complete."

      # ----------------------------------------------------------------
      # Bare-mode frontend build
      # When no GitHub token was provided, Amplify has no source
      # provider -- we build the Next.js frontend here and deploy the
      # static export to Amplify via the create-deployment API.
      # In GitHub mode this entire section is skipped.
      # ----------------------------------------------------------------
      - |
        if [ -z "$GITHUB_TOKEN" ]; then
          echo ""
          echo "=== BARE-MODE FRONTEND BUILD ==="
          echo ""
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')
          BACKEND_STACK="AIPresentationCoachStack-${SANITIZED_BRANCH}"
          AGENTCORE_STACK="AgentCoreStack-${SANITIZED_BRANCH}"
          AMPLIFY_STACK="AmplifyHostingStack-${SANITIZED_BRANCH}"
          echo "Extracting stack outputs..."
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey==\`$2\`].OutputValue" \
              --output text
          }
          export BARE_REGION=$(get_output "$BACKEND_STACK" "Region")
          export BARE_USER_POOL_ID=$(get_output "$BACKEND_STACK" "UserPoolId")
          export BARE_USER_POOL_CLIENT_ID=$(get_output "$BACKEND_STACK" "UserPoolClientId")
          export BARE_IDENTITY_POOL_ID=$(get_output "$BACKEND_STACK" "IdentityPoolId")
          export BARE_API_URL=$(get_output "$BACKEND_STACK" "ApiUrl")
          export BARE_WEBSOCKET_URL=$(get_output "$AGENTCORE_STACK" "AgentCoreWebSocketUrl")
          export BARE_AMPLIFY_APP_ID=$(get_output "$AMPLIFY_STACK" "AmplifyAppId")
          echo "  Region            = $BARE_REGION"
          echo "  UserPoolId        = $BARE_USER_POOL_ID"
          echo "  UserPoolClientId  = $BARE_USER_POOL_CLIENT_ID"
          echo "  IdentityPoolId    = $BARE_IDENTITY_POOL_ID"
          echo "  ApiUrl            = $BARE_API_URL"
          echo "  WebSocketUrl      = $BARE_WEBSOCKET_URL"
          echo "  AmplifyAppId      = $BARE_AMPLIFY_APP_ID"
          if [ -z "$BARE_AMPLIFY_APP_ID" ] || [ -z "$BARE_API_URL" ] || [ -z "$BARE_USER_POOL_ID" ]; then
            echo "Failed to retrieve required stack outputs."
            echo "The backend is deployed -- you can build and deploy the frontend manually."
            exit 0
          fi
          echo "Changing to frontend directory..."
          cd $CODEBUILD_SRC_DIR/frontend
          echo "Creating .env.local with stack outputs..."
          echo "NEXT_PUBLIC_COGNITO_REGION=$BARE_REGION" | tee .env.local
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$BARE_USER_POOL_ID" >> .env.local
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=$BARE_USER_POOL_CLIENT_ID" >> .env.local
          echo "NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID=$BARE_IDENTITY_POOL_ID" >> .env.local
          echo "NEXT_PUBLIC_API_BASE_URL=$BARE_API_URL" >> .env.local
          echo "NEXT_PUBLIC_WEBSOCKET_API_URL=$BARE_WEBSOCKET_URL" >> .env.local
          echo "Installing frontend dependencies..."
          npm ci
          echo "Building Next.js static export..."
          npm run build
          echo "Creating deployment package..."
          cd out && zip -r build.zip .
          echo "Persisting Amplify metadata for post_build..."
          echo "$BARE_AMPLIFY_APP_ID" > $CODEBUILD_SRC_DIR/.bare_amplify_app_id
        else
          echo "GitHub mode -- Amplify builds the frontend from source automatically."
        fi
    finally:
      - echo "Build phase completed"

  post_build:
    commands:
      - echo "Deployment completed successfully!"
      - echo "Stack Name - $STACK_NAME"
      - echo "Retrieving stack outputs..."
      - aws cloudformation describe-stacks --stack-name $STACK_NAME --query 'Stacks[0].Outputs' --output table || echo "Could not retrieve outputs"

      # Seed personas into DynamoDB
      - |
        echo "Looking for UserPersonaTable in stack resources..."
        PERSONA_TABLE=$(aws cloudformation list-stack-resources \
          --stack-name "$STACK_NAME" \
          --query "StackResourceSummaries[?contains(LogicalResourceId, 'UserPersonaTable')].PhysicalResourceId" \
          --output text)
        if [ -n "$PERSONA_TABLE" ] && [ "$PERSONA_TABLE" != "None" ]; then
          echo "Seeding personas into table: $PERSONA_TABLE"
          node -e "
            const fs = require('fs');
            const personas = JSON.parse(fs.readFileSync('$CODEBUILD_SRC_DIR/backend/persona/personas.json', 'utf8'));
            function m(v) {
              if (v === null || v === undefined) return { NULL: true };
              if (typeof v === 'string') return { S: v };
              if (typeof v === 'number') return { N: String(v) };
              if (typeof v === 'boolean') return { BOOL: v };
              if (Array.isArray(v)) return { L: v.map(m) };
              if (typeof v === 'object') {
                const o = {};
                for (const [k, val] of Object.entries(v)) o[k] = m(val);
                return { M: o };
              }
            }
            for (const p of personas) {
              const item = {};
              for (const [k, v] of Object.entries(p)) item[k] = m(v);
              console.log(JSON.stringify(item));
            }
          " | while IFS= read -r item; do
            aws dynamodb put-item \
              --table-name "$PERSONA_TABLE" \
              --item "$item"
          done
          echo "Personas seeded successfully."
        else
          echo "WARNING: UserPersonaTable not found in stack $STACK_NAME -- skipping persona seeding."
        fi

      # Bare-mode: deploy frontend to Amplify
      - |
        if [ -z "$GITHUB_TOKEN" ] && [ -f "$CODEBUILD_SRC_DIR/.bare_amplify_app_id" ]; then
          export BARE_AMPLIFY_APP_ID=$(cat $CODEBUILD_SRC_DIR/.bare_amplify_app_id)
          echo "Deploying frontend to Amplify..."
          cd $CODEBUILD_SRC_DIR/frontend

          echo "Cancelling any in-progress Amplify jobs..."
          ACTIVE_JOBS=$(aws amplify list-jobs \
            --app-id "$BARE_AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_DEFAULT_REGION" \
            --query "jobSummaries[?status=='PENDING' || status=='RUNNING'].jobId" \
            --output text 2>/dev/null || true)
          if [ -n "$ACTIVE_JOBS" ] && [ "$ACTIVE_JOBS" != "None" ]; then
            for JID in $ACTIVE_JOBS; do
              echo "  Stopping job $JID..."
              aws amplify stop-job \
                --app-id "$BARE_AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --job-id "$JID" \
                --region "$AWS_DEFAULT_REGION" 2>/dev/null || true
            done
            echo "  Waiting for jobs to stop..."
            sleep 5
          fi

          echo "Creating Amplify deployment..."
          if ! aws amplify create-deployment \
            --app-id "$BARE_AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_DEFAULT_REGION" \
            --output json > deployment_response.json; then
            echo "ERROR: Failed to create Amplify deployment."
            cat deployment_response.json 2>/dev/null || true
            echo "Backend is deployed but frontend deployment failed."
            exit 1
          fi

          echo "Extracting upload URL and job ID..."
          export UPLOAD_URL=$(node -e "const data=require('./deployment_response.json'); console.log(data.zipUploadUrl)")
          export JOB_ID=$(node -e "const data=require('./deployment_response.json'); console.log(data.jobId)")
          if [ -z "$UPLOAD_URL" ] || [ -z "$JOB_ID" ]; then
            echo "ERROR: Could not extract upload URL or job ID from deployment response."
            cat deployment_response.json
            exit 1
          fi

          echo "Uploading build.zip to Amplify..."
          cd out
          if ! curl --fail -s -X PUT -T build.zip "$UPLOAD_URL"; then
            echo "ERROR: Failed to upload build.zip to Amplify."
            exit 1
          fi

          echo "Starting deployment..."
          aws amplify start-deployment \
            --app-id "$BARE_AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-id "$JOB_ID" \
            --region "$AWS_DEFAULT_REGION"
          echo "Deployment finished successfully!"
        fi
    finally:
      - echo "Post-build phase completed"
