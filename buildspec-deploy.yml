version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - node --version
      - npm --version
      # zip is needed for bare-mode frontend deployment to Amplify
      - yum install -y zip
    finally:
      - echo "Install phase completed"

  pre_build:
    commands:
      - echo "Starting CDK deployment process..."
      - echo "Branch - $BRANCH_NAME"
      - echo "Stack Name - $STACK_NAME"
      - |
        if [ -z "$BRANCH_NAME" ] || [ -z "$STACK_NAME" ]; then
          echo "Error - Required environment variables not set"
          exit 1
        fi
      - |
        CDK_CONTEXT="-c branchName=$BRANCH_NAME"
        if [ -n "$GITHUB_TOKEN" ] && [ -n "$GITHUB_OWNER" ] && [ -n "$GITHUB_REPO" ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c githubOwner=$GITHUB_OWNER -c githubRepo=$GITHUB_REPO -c githubToken=$GITHUB_TOKEN"
          echo "GitHub mode enabled for $GITHUB_OWNER/$GITHUB_REPO"
        else
          echo "Bare mode (no GitHub CI/CD) — frontend will be built and deployed by this build"
        fi
        export CDK_CONTEXT
      - echo "Changing to backend directory..."
      - cd backend
      - echo "Installing npm dependencies..."
      - npm install
      - echo "Checking if CDK bootstrap is needed..."
      - npx cdk bootstrap $CDK_CONTEXT --require-approval never
    finally:
      - echo "Pre-build phase completed"

  build:
    on-failure: ABORT
    commands:
      - echo "Deploying CDK stack..."
      - echo "Listing available stacks..."
      - npx cdk list $CDK_CONTEXT
      - echo "Deploying all stacks..."
      - npx cdk deploy --all $CDK_CONTEXT --require-approval never --verbose
    finally:
      - echo "Build phase completed"

  post_build:
    commands:
      - echo "Deployment completed successfully!"
      - echo "Stack Name - $STACK_NAME"
      - echo "Retrieving stack outputs..."
      - aws cloudformation describe-stacks --stack-name $STACK_NAME --query 'Stacks[0].Outputs' --output table || echo "Could not retrieve outputs"

      # ──────────────────────────────────────────────────────────────
      # Bare-mode frontend build & deploy
      # When no GitHub token was provided, Amplify has no source
      # provider — we build the Next.js frontend here and push the
      # static export to Amplify via the create-deployment API.
      # In GitHub mode this entire section is skipped.
      # ──────────────────────────────────────────────────────────────

      # Step 1: Extract stack outputs and build the frontend (bare mode only)
      - |
        if [ -z "$GITHUB_TOKEN" ]; then
          if [ "$CODEBUILD_BUILD_SUCCEEDING" = "0" ]; then
            echo "CDK deployment failed — skipping frontend build & deploy."
            exit 1
          fi
          echo ""
          echo "=== BARE-MODE FRONTEND BUILD & DEPLOY ==="
          echo ""
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')
          BACKEND_STACK="AIPresentationCoachStack-${SANITIZED_BRANCH}"
          AGENTCORE_STACK="AgentCoreStack-${SANITIZED_BRANCH}"
          AMPLIFY_STACK="AmplifyHostingStack-${SANITIZED_BRANCH}"
          echo "Extracting stack outputs..."
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey==\`$2\`].OutputValue" \
              --output text
          }
          export BARE_REGION=$(get_output "$BACKEND_STACK" "Region")
          export BARE_USER_POOL_ID=$(get_output "$BACKEND_STACK" "UserPoolId")
          export BARE_USER_POOL_CLIENT_ID=$(get_output "$BACKEND_STACK" "UserPoolClientId")
          export BARE_IDENTITY_POOL_ID=$(get_output "$BACKEND_STACK" "IdentityPoolId")
          export BARE_API_URL=$(get_output "$BACKEND_STACK" "ApiUrl")
          export BARE_WEBSOCKET_URL=$(get_output "$AGENTCORE_STACK" "AgentCoreWebSocketUrl")
          export BARE_AMPLIFY_APP_ID=$(get_output "$AMPLIFY_STACK" "AmplifyAppId")
          echo "  Region            = $BARE_REGION"
          echo "  UserPoolId        = $BARE_USER_POOL_ID"
          echo "  UserPoolClientId  = $BARE_USER_POOL_CLIENT_ID"
          echo "  IdentityPoolId    = $BARE_IDENTITY_POOL_ID"
          echo "  ApiUrl            = $BARE_API_URL"
          echo "  WebSocketUrl      = $BARE_WEBSOCKET_URL"
          echo "  AmplifyAppId      = $BARE_AMPLIFY_APP_ID"
          if [ -z "$BARE_AMPLIFY_APP_ID" ] || [ -z "$BARE_API_URL" ] || [ -z "$BARE_USER_POOL_ID" ]; then
            echo "Error: Failed to retrieve required stack outputs."
            echo "The backend is deployed — you can build and deploy the frontend manually."
            exit 0
          fi
          cd $CODEBUILD_SRC_DIR/frontend
          echo "NEXT_PUBLIC_COGNITO_REGION=$BARE_REGION" > .env.local
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$BARE_USER_POOL_ID" >> .env.local
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=$BARE_USER_POOL_CLIENT_ID" >> .env.local
          echo "NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID=$BARE_IDENTITY_POOL_ID" >> .env.local
          echo "NEXT_PUBLIC_API_BASE_URL=$BARE_API_URL" >> .env.local
          echo "NEXT_PUBLIC_WEBSOCKET_API_URL=$BARE_WEBSOCKET_URL" >> .env.local
          echo ""
          echo "Generated .env.local:"
          cat .env.local
          echo ""
          echo "Installing frontend dependencies..."
          npm ci
          echo "Building Next.js static export..."
          npm run build
          echo "Creating deployment package..."
          cd out
          zip -r ../build.zip .
          cd ..
          echo "build.zip created at: $(pwd)/build.zip ($(du -h build.zip | cut -f1))"
          export BARE_MODE=true
        else
          echo "GitHub mode — Amplify builds the frontend from source automatically."
        fi

      # Step 2: Upload build.zip to S3 as a fallback artifact (bare mode only)
      - |
        if [ "$BARE_MODE" = "true" ]; then
          echo ""
          echo "--- Uploading build.zip to S3 as fallback artifact ---"
          ARTIFACT_BUCKET="ai-coach-deploy-artifacts-$(aws sts get-caller-identity --query Account --output text)"
          export ARTIFACT_BUCKET

          # Create bucket if it doesn't exist (ignore error if it already exists)
          aws s3 mb "s3://$ARTIFACT_BUCKET" --region "$AWS_DEFAULT_REGION" 2>/dev/null || true

          ARTIFACT_KEY="bare-mode-builds/${BRANCH_NAME}/build.zip"
          aws s3 cp "$CODEBUILD_SRC_DIR/frontend/build.zip" "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}" --region "$AWS_DEFAULT_REGION"

          if [ $? -eq 0 ]; then
            export ARTIFACT_S3_URI="s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
            echo "Build artifact uploaded to: $ARTIFACT_S3_URI"
          else
            echo "Warning: Failed to upload build.zip to S3. Continuing with Amplify deploy attempt."
            export ARTIFACT_S3_URI=""
          fi
        fi

      # Step 3: Print instructions for manual Amplify deploy (bare mode only)
      - |
        if [ "$BARE_MODE" = "true" ]; then
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              BARE-MODE DEPLOYMENT COMPLETE                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ✅ Backend stacks deployed successfully."
          echo "  ✅ Frontend build.zip created and uploaded to S3."
          echo ""
          echo "  To finish, deploy the frontend to Amplify:"
          echo ""
          echo "  ── Download build.zip ──────────────────────────────────────"
          echo "  aws s3 cp $ARTIFACT_S3_URI ./build.zip"
          echo ""
          echo "  ── Deploy to Amplify via CLI ───────────────────────────────"
          echo "  DEPLOY=\$(aws amplify create-deployment --app-id $BARE_AMPLIFY_APP_ID --branch-name $BRANCH_NAME --region $AWS_DEFAULT_REGION --output json)"
          echo "  URL=\$(echo \$DEPLOY | python3 -c \"import sys,json; print(json.load(sys.stdin)['zipUploadUrl'])\")"
          echo "  JOB=\$(echo \$DEPLOY | python3 -c \"import sys,json; print(json.load(sys.stdin)['jobId'])\")"
          echo "  curl -X PUT -T build.zip \"\$URL\""
          echo "  aws amplify start-deployment --app-id $BARE_AMPLIFY_APP_ID --branch-name $BRANCH_NAME --job-id \$JOB --region $AWS_DEFAULT_REGION"
          echo ""
          echo "  ── Or deploy via Amplify Console ───────────────────────────"
          echo "  1. Go to: https://console.aws.amazon.com/amplify/apps/$BARE_AMPLIFY_APP_ID/overview"
          echo "  2. Click the branch '$BRANCH_NAME'"
          echo "  3. Use 'Deploy without Git provider' and upload build.zip"
          echo ""
          echo "  S3 artifact:      $ARTIFACT_S3_URI"
          echo "  Amplify App ID:   $BARE_AMPLIFY_APP_ID"
          echo "  Branch:           $BRANCH_NAME"
          echo "  Region:           $AWS_DEFAULT_REGION"
          echo ""
          echo "══════════════════════════════════════════════════════════════"
        fi
    finally:
      - echo "Post-build phase completed"
